<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rechtschreib-Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fef8ee; --ink: #1a1614; --paper: #ffffff;
    --accent: #ff5b22; --accent-soft: #ffe8dd;
    --green: #2d7d4f; --green-soft: #d4edd9;
    --red: #c63030; --red-soft: #fad9d9;
    --blue: #2c5282; --blue-soft: #d6e4f0;
    --muted: #8a807a; --line: #e8ddd0;
    --shadow: 4px 4px 0 var(--ink);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Fraunces', Georgia, serif;
    background: var(--bg); color: var(--ink);
    min-height: 100vh; padding: 24px 16px;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,91,34,0.04) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(45,125,79,0.04) 0%, transparent 40%);
  }
  .container { max-width: 720px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 32px; padding: 24px 16px 8px; }
  .logo {
    font-size: 12px; font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.2em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 12px;
  }
  h1 {
    font-family: 'Fraunces', serif; font-weight: 800;
    font-size: clamp(36px, 7vw, 56px); line-height: 1;
    letter-spacing: -0.02em; font-variation-settings: "opsz" 144;
  }
  h1 em { font-style: italic; color: var(--accent); font-weight: 400; }
  .subtitle { margin-top: 8px; color: var(--muted); font-size: 16px; font-style: italic; }
  .stats { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat {
    flex: 1; min-width: 90px; background: var(--paper);
    border: 2px solid var(--ink); box-shadow: var(--shadow);
    padding: 12px 14px; border-radius: 4px;
  }
  .stat-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted);
  }
  .stat-value {
    font-size: 28px; font-weight: 800; line-height: 1.1;
    margin-top: 4px; font-variation-settings: "opsz" 144;
  }
  .stat-value.streak { color: var(--accent); }
  .stat-value.score { color: var(--green); }
  .stat-value.level { color: var(--blue); font-size: 18px; padding-top: 6px; }
  .level-badge {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 12px; font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.1em;
    font-weight: 600; margin-left: 8px; vertical-align: middle;
  }
  .level-1 { background: var(--green-soft); color: var(--green); }
  .level-2 { background: var(--accent-soft); color: var(--accent); }
  .level-3 { background: var(--red-soft); color: var(--red); }
  .card {
    background: var(--paper); border: 2px solid var(--ink);
    box-shadow: var(--shadow); padding: 32px 24px;
    border-radius: 4px; margin-bottom: 20px;
  }
  .mode-badge {
    display: inline-block; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em;
    background: var(--ink); color: var(--bg); padding: 4px 10px;
    border-radius: 2px; margin-bottom: 16px;
  }
  .category-tag {
    display: inline-block; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); margin-left: 8px;
  }
  .question { font-size: 18px; margin-bottom: 24px; line-height: 1.5; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    background: var(--bg); border: 2px solid var(--ink);
    padding: 16px 20px; border-radius: 4px;
    font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600;
    text-align: left; cursor: pointer; transition: all 0.15s ease; color: var(--ink);
    width: 100%;
  }
  .option:hover:not(:disabled) {
    transform: translate(-2px, -2px); box-shadow: 4px 4px 0 var(--ink);
    background: var(--accent-soft);
  }
  .option:disabled { cursor: default; }
  .option.correct { background: var(--green-soft); border-color: var(--green); color: var(--green); }
  .option.wrong { background: var(--red-soft); border-color: var(--red); color: var(--red); }
  input[type="text"] {
    width: 100%; background: var(--bg); border: 2px solid var(--ink);
    padding: 16px 20px; border-radius: 4px;
    font-family: 'Fraunces', serif; font-size: 24px; font-weight: 600;
    color: var(--ink); margin-bottom: 16px;
  }
  input[type="text"]:focus { outline: none; box-shadow: var(--shadow); background: var(--paper); }
  input.correct { background: var(--green-soft); border-color: var(--green); color: var(--green); }
  input.wrong { background: var(--red-soft); border-color: var(--red); color: var(--red); }
  .lueckentext {
    font-size: 26px; font-weight: 600; line-height: 1.6;
    margin-bottom: 24px; letter-spacing: -0.01em;
  }
  .lueckentext input {
    display: inline-block; width: auto; min-width: 120px;
    font-size: 26px; padding: 4px 12px; margin: 0 4px; text-align: center;
  }
  .btn {
    background: var(--ink); color: var(--bg); border: 2px solid var(--ink);
    padding: 14px 24px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.1em;
    cursor: pointer; transition: all 0.15s ease;
  }
  .btn:hover:not(:disabled) { transform: translate(-2px, -2px); box-shadow: var(--shadow); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-accent { background: var(--accent); border-color: var(--accent); }
  .btn-secondary { background: var(--paper); color: var(--ink); }
  .btn-blue { background: var(--blue); border-color: var(--blue); }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; justify-content: center; }
  .feedback {
    margin-top: 20px; padding: 16px 20px; border-radius: 4px;
    border: 2px solid; font-size: 16px; line-height: 1.5;
  }
  .feedback.correct { background: var(--green-soft); border-color: var(--green); color: var(--green); }
  .feedback.wrong { background: var(--red-soft); border-color: var(--red); color: var(--red); }
  .feedback strong { font-weight: 800; }
  .hint { font-style: italic; margin-top: 8px; font-size: 15px; opacity: 0.85; }
  .audio-btn {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--accent); color: white; border: 2px solid var(--ink);
    padding: 18px 28px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.1em;
    cursor: pointer; transition: all 0.15s ease; margin-bottom: 20px;
  }
  .audio-btn:hover { transform: translate(-2px, -2px); box-shadow: var(--shadow); }
  .audio-btn .icon { font-size: 20px; }
  .start-screen { text-align: center; padding: 40px 24px; }
  .start-screen p { font-size: 17px; line-height: 1.6; margin-bottom: 16px; color: var(--muted); }
  .level-cards { display: grid; grid-template-columns: 1fr; gap: 12px; margin: 20px 0; }
  @media (min-width: 600px) { .level-cards { grid-template-columns: repeat(3, 1fr); } }
  .level-card {
    background: var(--bg); border: 2px solid var(--ink);
    padding: 20px 16px; border-radius: 4px;
    cursor: pointer; transition: all 0.15s ease; text-align: left;
  }
  .level-card:hover { transform: translate(-2px, -2px); box-shadow: var(--shadow); }
  .level-card.selected { background: var(--accent-soft); border-color: var(--accent); }
  .level-card-num {
    font-size: 28px; font-weight: 800; line-height: 1;
    font-variation-settings: "opsz" 144; margin-bottom: 4px;
  }
  .level-card-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); margin-bottom: 8px;
  }
  .level-card-desc { font-size: 14px; line-height: 1.4; color: var(--ink); }
  .progress-bar {
    height: 6px; background: var(--line); border-radius: 3px;
    overflow: hidden; margin-bottom: 24px;
  }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.4s ease; }
  .end-screen { text-align: center; padding: 32px 16px; }
  .end-screen h2 {
    font-size: 36px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.02em;
  }
  .end-screen .big-score {
    font-size: 72px; font-weight: 800; color: var(--accent);
    line-height: 1; margin: 24px 0 8px; font-variation-settings: "opsz" 144;
  }
  .mistakes-list, .stats-block {
    text-align: left; background: var(--bg);
    border: 2px solid var(--line); padding: 20px;
    border-radius: 4px; margin: 24px 0;
  }
  .mistakes-list h3, .stats-block h3 {
    font-size: 13px; font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.15em;
    color: var(--muted); margin-bottom: 14px;
  }
  .mistakes-list .word {
    font-size: 18px; font-weight: 600; padding: 8px 0;
    border-bottom: 1px dashed var(--line);
  }
  .mistakes-list .word:last-child { border-bottom: none; }
  .mistakes-list .word .wrong-mark { color: var(--red); text-decoration: line-through; margin-right: 12px; }
  .mistakes-list .word .right-mark { color: var(--green); }
  .cat-stat-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 10px; font-size: 14px;
  }
  .cat-stat-row:last-child { margin-bottom: 0; }
  .cat-stat-label { flex: 0 0 145px; font-weight: 600; }
  .cat-stat-bar {
    flex: 1; height: 22px; background: var(--paper);
    border: 1px solid var(--ink); border-radius: 3px;
    overflow: hidden; position: relative;
  }
  .cat-stat-fill { height: 100%; background: var(--green); transition: width 0.6s ease; }
  .cat-stat-fill.warn { background: var(--accent); }
  .cat-stat-fill.bad { background: var(--red); }
  .cat-stat-num {
    flex: 0 0 60px; text-align: right;
    font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--muted);
  }
  .summary-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 12px; margin: 16px 0;
  }
  .summary-tile {
    background: var(--paper); border: 1px solid var(--line);
    padding: 12px; border-radius: 4px;
  }
  .summary-tile-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.15em; color: var(--muted);
  }
  .summary-tile-value { font-size: 22px; font-weight: 800; margin-top: 2px; }
  footer {
    text-align: center; margin-top: 40px; padding: 16px;
    font-size: 12px; font-family: 'JetBrains Mono', monospace;
    color: var(--muted); letter-spacing: 0.1em;
  }
  .nav-link {
    display: inline-block; color: var(--muted);
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.1em;
    text-decoration: underline; cursor: pointer; margin-top: 12px;
    background: none; border: none; padding: 6px 12px;
  }
  .nav-link:hover { color: var(--accent); }
  .level-up-box {
    margin-top: 16px; padding: 12px 16px;
    background: var(--blue-soft); border: 2px solid var(--blue);
    border-radius: 4px; color: var(--blue); font-weight: 600;
  }
  .tipp-box {
    margin-bottom: 16px; padding: 10px 14px;
    background: var(--blue-soft); border: 1px dashed var(--blue);
    border-radius: 4px; color: var(--blue);
    font-size: 14px;
  }
  .tipp-box code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px; font-weight: 600;
    background: var(--paper); padding: 2px 8px;
    border-radius: 3px; margin-left: 4px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">Deutsch · Klasse 7</div>
    <h1>Rechtschreib-<em>Trainer</em></h1>
    <div class="subtitle">Doppel-Vokale · Doppel-Konsonanten · Dehnungs-h · Groß/Klein</div>
  </header>
  <div id="stats-bar"></div>
  <div id="app"></div>
</div>
<footer>RECHTSCHREIB-TRAINER · FÜR NOAH · KLASSE 7</footer>

<script>
"use strict";

// ============ AUFGABEN ============
var AUFGABEN = [
  // DOPPELTE VOKALE - L1
  { kategorie: "Doppelte Vokale", level: 1, wort: "Boot", hinweis: "kleines Schiff", falsch: ["Bot", "Boht"], satz: "Wir fahren mit dem ___ über den See.", regel: "Doppel-o bei Boot, Moor, Moos." },
  { kategorie: "Doppelte Vokale", level: 1, wort: "Tee", hinweis: "warmes Getränk aus Blättern", falsch: ["Te", "Teh"], satz: "Ich trinke gerne grünen ___.", regel: "Tee mit Doppel-e." },
  { kategorie: "Doppelte Vokale", level: 1, wort: "Haar", hinweis: "wächst auf dem Kopf", falsch: ["Har", "Hahr"], satz: "Sie hat langes blondes ___.", regel: "Haar mit Doppel-a." },
  { kategorie: "Doppelte Vokale", level: 1, wort: "Paar", hinweis: "zwei zusammengehörige Dinge", falsch: ["Par", "Pahr"], satz: "Ich kaufe ein neues ___ Schuhe.", regel: "Paar (zwei Dinge) mit Doppel-a." },
  { kategorie: "Doppelte Vokale", level: 1, wort: "Saal", hinweis: "großer Raum für Veranstaltungen", falsch: ["Sal", "Sahl"], satz: "Der ___ war voll besetzt.", regel: "Saal mit Doppel-a (Plural: Säle)." },
  // DOPPELTE VOKALE - L2
  { kategorie: "Doppelte Vokale", level: 2, wort: "Meer", hinweis: "großes Salzwasser, z.B. Nordsee", falsch: ["Mer", "Mehr"], satz: "Wir machen Urlaub am ___.", regel: "Meer (Ozean) mit Doppel-e – nicht 'mehr'!" },
  { kategorie: "Doppelte Vokale", level: 2, wort: "Beere", hinweis: "kleine Frucht, z.B. Erdbeere", falsch: ["Bere", "Behre"], satz: "Eine reife ___ schmeckt süß.", regel: "Beere mit Doppel-e." },
  { kategorie: "Doppelte Vokale", level: 2, wort: "Aal", hinweis: "schlangenartiger Fisch", falsch: ["Al", "Ahl"], satz: "Der ___ ist ein langer Fisch.", regel: "Aal mit Doppel-a am Wortanfang." },
  { kategorie: "Doppelte Vokale", level: 2, wort: "Schnee", hinweis: "weiße Flocken im Winter", falsch: ["Schne", "Schneh"], satz: "Im Winter liegt ___.", regel: "Schnee mit Doppel-e." },
  { kategorie: "Doppelte Vokale", level: 2, wort: "leer", hinweis: "nichts mehr drin", falsch: ["ler", "lehr"], satz: "Der Tank ist ___.", regel: "leer mit Doppel-e – nicht 'lehr'!" },
  // DOPPELTE VOKALE - L3
  { kategorie: "Doppelte Vokale", level: 3, wort: "Staat", hinweis: "ein Land mit Regierung", falsch: ["Stat", "Staht"], satz: "Deutschland ist ein demokratischer ___.", regel: "Staat (Land) mit Doppel-a – nicht 'Stadt'!" },
  { kategorie: "Doppelte Vokale", level: 3, wort: "Waage", hinweis: "Gerät zum Wiegen", falsch: ["Wage", "Wahge"], satz: "Stell dich auf die ___.", regel: "Waage mit Doppel-a (zum Wiegen)." },
  { kategorie: "Doppelte Vokale", level: 3, wort: "Heer", hinweis: "die Armee, Soldaten-Truppe", falsch: ["Her", "Hehr"], satz: "Das römische ___ war stark.", regel: "Heer (Armee) mit Doppel-e – nicht 'her'!" },
  { kategorie: "Doppelte Vokale", level: 3, wort: "Seele", hinweis: "das Innere eines Menschen", falsch: ["Sele", "Sehle"], satz: "Musik berührt die ___.", regel: "Seele mit Doppel-e." },
  { kategorie: "Doppelte Vokale", level: 3, wort: "Maat", hinweis: "Unteroffizier bei der Marine", falsch: ["Mat", "Maht"], satz: "Der ___ ist Offizier auf einem Schiff.", regel: "Maat mit Doppel-a (Seemannssprache)." },

  // DOPPELTE KONSONANTEN - L1

  { kategorie: "Doppelte Konsonanten", level: 1, wort: "Sommer", hinweis: "die wärmste Jahreszeit", falsch: ["Somer", "Sohmer"], satz: "Im ___ ist es warm.", regel: "Kurzes o → Doppel-m." },
  { kategorie: "Doppelte Konsonanten", level: 1, wort: "Wasser", hinweis: "klare Flüssigkeit zum Trinken", falsch: ["Waser", "Wahser"], satz: "Ich trinke ein Glas ___.", regel: "Kurzes a → Doppel-s." },
  { kategorie: "Doppelte Konsonanten", level: 1, wort: "Mittag", hinweis: "die Zeit um 12 Uhr", falsch: ["Mitag", "Mihtag"], satz: "Wir essen um zwölf zu ___.", regel: "Kurzes i → Doppel-t." },
  // DOPPELTE KONSONANTEN - L2

  { kategorie: "Doppelte Konsonanten", level: 3, wort: "Kommissar", hinweis: "Polizei-Ermittler, z.B. im Krimi", falsch: ["Komisar", "Kommisar"], satz: "Der ___ ermittelt.", regel: "Doppel-m UND Doppel-s: Kommissar." },
  { kategorie: "Doppelte Konsonanten", level: 3, wort: "Aggression", hinweis: "starker Ärger, Wut", falsch: ["Agression", "Aggresion"], satz: "Sport baut ___ ab.", regel: "Doppel-g UND ein s: Aggression." },
  { kategorie: "Doppelte Konsonanten", level: 3, wort: "Diskussion", hinweis: "Gespräch mit unterschiedlichen Meinungen", falsch: ["Diskusion", "Diskusssion"], satz: "Wir hatten eine lange ___.", regel: "Diskussion mit Doppel-s, ein k." },

  // DEHNUNGS-H - L1
  { kategorie: "Dehnungs-h", level: 1, wort: "Bahn", hinweis: "Zug / S-Bahn", falsch: ["Ban", "Baan"], satz: "Ich fahre mit der ___.", regel: "Dehnungs-h vor n: Bahn, Hahn." },
  { kategorie: "Dehnungs-h", level: 1, wort: "Stuhl", hinweis: "Möbel zum Sitzen", falsch: ["Stul", "Stuul"], satz: "Setz dich auf den ___.", regel: "Dehnungs-h vor l: Stuhl, Mehl." },
  { kategorie: "Dehnungs-h", level: 1, wort: "wohnen", hinweis: "Verb: irgendwo leben", falsch: ["wonen", "woonen"], satz: "Wir ___ in Rheinstetten.", regel: "Dehnungs-h vor n: wohnen, ohne." },
  { kategorie: "Dehnungs-h", level: 1, wort: "Zahl", hinweis: "z.B. die 7 oder die 13", falsch: ["Zal", "Zaal"], satz: "Sieben ist meine Lieblings___.", regel: "Dehnungs-h vor l: Zahl, Wahl." },
  { kategorie: "Dehnungs-h", level: 1, wort: "Sahne", hinweis: "weiße Creme aus Milch", falsch: ["Sane", "Saane"], satz: "Auf den Kuchen kommt ___.", regel: "Dehnungs-h: Sahne." },

  { kategorie: "Groß-/Kleinschreibung", level: 2, wort: "Rad fahren", hinweis: "mit dem Fahrrad unterwegs sein", falsch: ["rad fahren", "Radfahren"], satz: "Ich gehe ___.", regel: "'Rad fahren' – getrennt, Rad groß." },
  { kategorie: "Groß-/Kleinschreibung", level: 2, wort: "Acht geben", hinweis: "aufpassen, vorsichtig sein", falsch: ["acht geben", "achtgeben"], satz: "Du musst ___ im Straßenverkehr.", regel: "'Acht geben' – Acht als Nomen, getrennt." },
  // GROSS-/KLEIN - L3
  { kategorie: "Groß-/Kleinschreibung", level: 3, wort: "des Weiteren", hinweis: "außerdem (förmlich)", falsch: ["des weiteren", "des Weitehren"], satz: "___ möchte ich sagen, dass …", regel: "Substantiviert → groß: 'des Weiteren'." },
  { kategorie: "Groß-/Kleinschreibung", level: 3, wort: "ohne Weiteres", hinweis: "ohne Probleme, einfach so", falsch: ["ohne weiteres", "ohne Weitehres"], satz: "Das geht ___.", regel: "Substantiviert → groß: 'ohne Weiteres'." },
  { kategorie: "Groß-/Kleinschreibung", level: 3, wort: "des Öfteren", hinweis: "öfter, häufiger", falsch: ["des öfteren", "des öftehren"], satz: "Wir treffen uns ___.", regel: "Substantiviert → groß: 'des Öfteren'." },
  { kategorie: "Groß-/Kleinschreibung", level: 3, wort: "bei Weitem", hinweis: "viel mehr als andere (Steigerung)", falsch: ["bei weitem", "bei Weitehm"], satz: "Er ist ___ der Beste.", regel: "Substantiviert → groß: 'bei Weitem'." },
  { kategorie: "Groß-/Kleinschreibung", level: 3, wort: "Auto fahren", hinweis: "ein Kfz lenken", falsch: ["auto fahren", "Autofahren"], satz: "Mein Vater kann gut ___.", regel: "'Auto fahren' getrennt, Auto groß (Nomen)." }
];

var MODI = ["multiple", "luecke", "diktat"];
var ANZAHL_RUNDEN = 12;
var LEVELS = {
  1: { name: "Leicht", desc: "Häufige Wörter, klare Regeln" },
  2: { name: "Mittel", desc: "Mehr Tücken und Verwechslungen" },
  3: { name: "Schwer", desc: "Fremdwörter & Spezialfälle" }
};
var KATEGORIEN = ["Doppelte Vokale", "Doppelte Konsonanten", "Dehnungs-h", "Groß-/Kleinschreibung"];

// ============ STATE ============
var state = {
  phase: "start",
  level: 1,
  ausgewaehltesLevel: 1,
  runde: 0,
  score: 0,
  streak: 0,
  aktAufgabe: null,
  aktModus: null,
  verwendeteIndizes: [],
  letzteAntwort: null,
  fehler: [],
  fehlerPool: null,
  antwortStatus: null,
  eingabe: "",
  gewaehlt: null,
  optionen: null,
  stats: {
    sessions: 0,
    totalRichtig: 0,
    totalFalsch: 0,
    bestScore: 0,
    bestStreak: 0,
    proKategorie: KATEGORIEN.reduce(function(acc, k) { acc[k] = { richtig: 0, falsch: 0 }; return acc; }, {}),
    proLevel: { 1: { richtig: 0, falsch: 0 }, 2: { richtig: 0, falsch: 0 }, 3: { richtig: 0, falsch: 0 } }
  }
};

// ============ HELPERS ============
function shuffle(arr) {
  var copy = arr.slice();
  for (var i = copy.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = copy[i]; copy[i] = copy[j]; copy[j] = tmp;
  }
  return copy;
}

function pickAufgabe(used, level) {
  var verfuegbar = [];
  for (var i = 0; i < AUFGABEN.length; i++) {
    if (AUFGABEN[i].level === level && used.indexOf(i) === -1) {
      verfuegbar.push({ a: AUFGABEN[i], i: i });
    }
  }
  if (verfuegbar.length === 0) {
    var alle = [];
    for (var k = 0; k < AUFGABEN.length; k++) {
      if (AUFGABEN[k].level === level) alle.push({ a: AUFGABEN[k], i: k });
    }
    if (alle.length === 0) return null;
    var p = alle[Math.floor(Math.random() * alle.length)];
    return { aufgabe: p.a, index: p.i };
  }
  var pick = verfuegbar[Math.floor(Math.random() * verfuegbar.length)];
  return { aufgabe: pick.a, index: pick.i };
}

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = "de-DE";
  u.rate = 0.85;
  var voices = window.speechSynthesis.getVoices();
  for (var i = 0; i < voices.length; i++) {
    if (voices[i].lang.indexOf("de") === 0) { u.voice = voices[i]; break; }
  }
  window.speechSynthesis.speak(u);
}

function escapeHtml(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

// Erzeugt einen Tipp wie "B___t" oder "am b___n" für ein Zielwort
function makeTipp(wort) {
  // Mehrwort-Ausdrücke: erstes Wort komplett zeigen, letztes Wort als Muster
  if (wort.indexOf(" ") > -1) {
    var teile = wort.split(" ");
    var letztes = teile[teile.length - 1];
    var muster = maskWort(letztes);
    teile[teile.length - 1] = muster;
    return teile.join(" ");
  }
  return maskWort(wort);
}

function maskWort(w) {
  if (w.length <= 2) return w.charAt(0) + "…";
  if (w.length === 3) return w.charAt(0) + "_" + w.charAt(w.length - 1);
  // ≥ 4 Buchstaben: ersten + letzten Buchstaben zeigen, Mitte maskieren
  return w.charAt(0) + "___" + w.charAt(w.length - 1);
}

// ============ STATE UPDATERS ============
function updateStats(richtig, aufgabe) {
  if (richtig) state.stats.totalRichtig++; else state.stats.totalFalsch++;
  state.stats.proKategorie[aufgabe.kategorie][richtig ? "richtig" : "falsch"]++;
  state.stats.proLevel[aufgabe.level][richtig ? "richtig" : "falsch"]++;
}

function naechsteAufgabe() {
  state.eingabe = "";
  state.gewaehlt = null;
  state.antwortStatus = null;
  state.optionen = null;

  if (state.fehlerPool && state.fehlerPool.length > 0) {
    var idx = Math.floor(Math.random() * state.fehlerPool.length);
    state.aktAufgabe = state.fehlerPool[idx];
    state.fehlerPool.splice(idx, 1);
  } else {
    var result = pickAufgabe(state.verwendeteIndizes, state.level);
    if (!result) { state.phase = "ende"; render(); return; }
    state.aktAufgabe = result.aufgabe;
    state.verwendeteIndizes.push(result.index);
  }
  state.aktModus = MODI[Math.floor(Math.random() * MODI.length)];
  if (state.aktModus === "multiple") {
    state.optionen = shuffle([state.aktAufgabe.wort].concat(state.aktAufgabe.falsch));
  }
  state.phase = "spielen";
  render();
}

function start(neuesLevel) {
  var lvl = (typeof neuesLevel === "number") ? neuesLevel : state.ausgewaehltesLevel;
  state.level = lvl;
  state.ausgewaehltesLevel = lvl;
  state.runde = 1;
  state.score = 0;
  state.streak = 0;
  state.fehler = [];
  state.verwendeteIndizes = [];
  state.fehlerPool = null;
  state.letzteAntwort = null;
  naechsteAufgabe();
}

function fehlerUeben() {
  state.runde = 1;
  state.score = 0;
  state.streak = 0;
  state.verwendeteIndizes = [];
  var pool = state.fehler.map(function(f) { return f.aufgabe; });
  state.fehler = [];
  state.letzteAntwort = null;
  state.fehlerPool = pool;
  naechsteAufgabe();
}

function handleAntwort(richtig, eingabe) {
  updateStats(richtig, state.aktAufgabe);
  if (richtig) {
    var punkte = 10 + Math.min(state.streak, 5);
    state.score += punkte;
    state.streak += 1;
    if (state.streak > state.stats.bestStreak) state.stats.bestStreak = state.streak;
  } else {
    state.streak = 0;
    state.fehler.push({ aufgabe: state.aktAufgabe, eingabe: eingabe });
  }
  state.letzteAntwort = { richtig: richtig, eingabe: eingabe, aufgabe: state.aktAufgabe };
  state.phase = "feedback";
  render();
}

function finalisiereSession() {
  state.stats.sessions++;
  if (state.score > state.stats.bestScore) state.stats.bestScore = state.score;
  state.phase = "ende";
  render();
}

function weiter() {
  if (state.fehlerPool !== null) {
    if (state.fehlerPool.length === 0) { finalisiereSession(); return; }
    state.runde++;
    state.letzteAntwort = null;
    naechsteAufgabe();
    return;
  }
  if (state.runde >= ANZAHL_RUNDEN) { finalisiereSession(); return; }
  state.runde++;
  state.letzteAntwort = null;
  naechsteAufgabe();
}

// ============ ACTION HANDLERS ============
function handleMultipleClick(opt) {
  if (state.gewaehlt) return;
  state.gewaehlt = opt;
  render();
  setTimeout(function() {
    handleAntwort(opt === state.aktAufgabe.wort, opt);
  }, 1200);
}

function handlePruefen() {
  var input = document.getElementById("eingabe-input");
  if (!input) return;
  var val = input.value.trim();
  if (!val || state.antwortStatus) return;
  state.eingabe = val;
  var richtig = val === state.aktAufgabe.wort;
  state.antwortStatus = richtig ? "correct" : "wrong";
  render();
  setTimeout(function() {
    handleAntwort(richtig, val);
  }, 1500);
}

function handleEingabeKey(e) {
  if (e.key === "Enter") handlePruefen();
}

function selectLevel(l) {
  state.ausgewaehltesLevel = l;
  render();
}

function showStats() {
  state.phase = "statsView";
  render();
}

function backToStart() {
  state.phase = "start";
  render();
}

// ============ RENDERERS ============
function renderStatsBar() {
  var bar = document.getElementById("stats-bar");
  if (state.phase !== "spielen" && state.phase !== "feedback") {
    bar.innerHTML = "";
    return;
  }
  var totalRunden = state.fehlerPool !== null ? "?" : ANZAHL_RUNDEN;
  var pct = typeof totalRunden === "number" ? (state.runde / totalRunden) * 100 : 50;

  bar.innerHTML =
    '<div class="stats">' +
      '<div class="stat"><div class="stat-label">Punkte</div><div class="stat-value score">' + state.score + '</div></div>' +
      '<div class="stat"><div class="stat-label">Streak 🔥</div><div class="stat-value streak">' + state.streak + '</div></div>' +
      '<div class="stat"><div class="stat-label">Runde</div><div class="stat-value">' + state.runde + '/' + totalRunden + '</div></div>' +
      '<div class="stat"><div class="stat-label">Level</div><div class="stat-value level">' + LEVELS[state.level].name + '</div></div>' +
    '</div>' +
    '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
}

function renderStart() {
  var levelHtml = "";
  for (var l = 1; l <= 3; l++) {
    var sel = state.ausgewaehltesLevel === l ? " selected" : "";
    levelHtml +=
      '<div class="level-card' + sel + '" data-level="' + l + '">' +
        '<div class="level-card-num">' + l + '</div>' +
        '<div class="level-card-label">' + LEVELS[l].name + '</div>' +
        '<div class="level-card-desc">' + LEVELS[l].desc + '</div>' +
      '</div>';
  }
  var statsLink = state.stats.sessions > 0
    ? '<div><button class="nav-link" id="show-stats-btn">📊 Meine Statistik ansehen</button></div>'
    : '';

  return '<div class="card start-screen">' +
    '<p style="margin-top:16px;margin-bottom:8px">Hi Noah! Wähle dein Level und los geht\'s.<br/>' + ANZAHL_RUNDEN + ' Aufgaben pro Runde in 3 Modi.</p>' +
    '<div class="level-cards">' + levelHtml + '</div>' +
    '<button class="btn btn-accent" id="start-btn">Los geht\'s →</button>' +
    statsLink +
  '</div>';
}

function renderStatsScreen() {
  var s = state.stats;
  var total = s.totalRichtig + s.totalFalsch;
  var quote = total > 0 ? Math.round((s.totalRichtig / total) * 100) : 0;

  function renderBar(richtig, falsch) {
    var ges = richtig + falsch;
    if (ges === 0) return '<div class="cat-stat-bar"></div>';
    var pct = Math.round((richtig / ges) * 100);
    var cls = pct >= 75 ? "" : pct >= 50 ? "warn" : "bad";
    return '<div class="cat-stat-bar"><div class="cat-stat-fill ' + cls + '" style="width:' + pct + '%"></div></div>';
  }

  var katHtml = "";
  for (var i = 0; i < KATEGORIEN.length; i++) {
    var k = KATEGORIEN[i];
    var ks = s.proKategorie[k];
    var ges = ks.richtig + ks.falsch;
    var pct = ges > 0 ? Math.round((ks.richtig / ges) * 100) : 0;
    katHtml +=
      '<div class="cat-stat-row">' +
        '<div class="cat-stat-label">' + k + '</div>' +
        renderBar(ks.richtig, ks.falsch) +
        '<div class="cat-stat-num">' + (ges > 0 ? pct + "%" : "–") + '</div>' +
      '</div>';
  }

  var lvlHtml = "";
  for (var l = 1; l <= 3; l++) {
    var ls = s.proLevel[l];
    var ges2 = ls.richtig + ls.falsch;
    var pct2 = ges2 > 0 ? Math.round((ls.richtig / ges2) * 100) : 0;
    lvlHtml +=
      '<div class="cat-stat-row">' +
        '<div class="cat-stat-label">Level ' + l + ' – ' + LEVELS[l].name + '</div>' +
        renderBar(ls.richtig, ls.falsch) +
        '<div class="cat-stat-num">' + (ges2 > 0 ? pct2 + "%" : "–") + '</div>' +
      '</div>';
  }

  return '<div class="card">' +
    '<h2 style="font-size:28px;font-weight:800;letter-spacing:-0.02em;margin-bottom:6px">Deine Statistik</h2>' +
    '<p style="color:var(--muted);font-size:14px;margin-bottom:8px">Dein Fortschritt über alle Runden in dieser Sitzung.</p>' +
    '<div class="summary-grid">' +
      '<div class="summary-tile"><div class="summary-tile-label">Runden</div><div class="summary-tile-value">' + s.sessions + '</div></div>' +
      '<div class="summary-tile"><div class="summary-tile-label">Trefferquote</div><div class="summary-tile-value">' + quote + '%</div></div>' +
      '<div class="summary-tile"><div class="summary-tile-label">Beste Punkte</div><div class="summary-tile-value">' + s.bestScore + '</div></div>' +
      '<div class="summary-tile"><div class="summary-tile-label">Beste Streak</div><div class="summary-tile-value">' + s.bestStreak + ' 🔥</div></div>' +
    '</div>' +
    '<div class="stats-block"><h3>Pro Kategorie</h3>' + katHtml + '</div>' +
    '<div class="stats-block"><h3>Pro Level</h3>' + lvlHtml + '</div>' +
    '<button class="btn btn-secondary" id="back-btn">← Zurück</button>' +
  '</div>';
}

function renderMultiple() {
  var a = state.aktAufgabe;
  var optsHtml = "";
  for (var i = 0; i < state.optionen.length; i++) {
    var opt = state.optionen[i];
    var cls = "option";
    if (state.gewaehlt) {
      if (opt === a.wort) cls += " correct";
      else if (opt === state.gewaehlt) cls += " wrong";
    }
    var disabled = state.gewaehlt ? " disabled" : "";
    optsHtml += '<button class="' + cls + '" data-opt="' + escapeHtml(opt) + '"' + disabled + '>' + escapeHtml(opt) + '</button>';
  }

  return '<div class="card">' +
    '<div class="mode-badge">Multiple Choice</div>' +
    '<span class="level-badge level-' + a.level + '">L' + a.level + '</span>' +
    '<span class="category-tag">' + a.kategorie + '</span>' +
    '<div class="question">Welche Schreibweise ist <strong>richtig</strong>?</div>' +
    '<div class="options">' + optsHtml + '</div>' +
  '</div>';
}

function renderLuecke() {
  var a = state.aktAufgabe;
  var teile = a.satz.split("___");
  var statusCls = state.antwortStatus === "correct" ? " correct" : state.antwortStatus === "wrong" ? " wrong" : "";
  var disabled = state.antwortStatus ? " disabled" : "";
  var val = state.eingabe ? ' value="' + escapeHtml(state.eingabe) + '"' : "";

  return '<div class="card">' +
    '<div class="mode-badge">Lückentext</div>' +
    '<span class="level-badge level-' + a.level + '">L' + a.level + '</span>' +
    '<span class="category-tag">' + a.kategorie + '</span>' +
    '<div class="question" style="margin-bottom:12px">Setze das richtige Wort ein:</div>' +
    '<div class="lueckentext">' +
      escapeHtml(teile[0]) +
      '<input type="text" id="eingabe-input" class="' + statusCls.trim() + '" placeholder="…" autocomplete="off" spellcheck="false"' + val + disabled + '>' +
      escapeHtml(teile[1] || "") +
    '</div>' +
    '<div class="tipp-box">💡 Gesuchtes Wort: <em>' + escapeHtml(a.hinweis) + '</em></div>' +
    '<button class="btn btn-accent" id="pruefen-btn"' + disabled + '>Prüfen</button>' +
  '</div>';
}

function renderDiktat() {
  var a = state.aktAufgabe;
  var statusCls = state.antwortStatus === "correct" ? " correct" : state.antwortStatus === "wrong" ? " wrong" : "";
  var disabled = state.antwortStatus ? " disabled" : "";
  var val = state.eingabe ? ' value="' + escapeHtml(state.eingabe) + '"' : "";
  var anzBuchstaben = a.wort.replace(/ /g, "").length;
  var anzWoerter = a.wort.split(" ").length;
  var lenHint = anzWoerter > 1
    ? anzWoerter + " Wörter, " + anzBuchstaben + " Buchstaben"
    : anzBuchstaben + " Buchstaben";

  return '<div class="card">' +
    '<div class="mode-badge">Diktat</div>' +
    '<span class="level-badge level-' + a.level + '">L' + a.level + '</span>' +
    '<span class="category-tag">' + a.kategorie + '</span>' +
    '<div class="question" style="margin-bottom:16px">Hör genau hin und schreibe das Wort richtig auf:</div>' +
    '<button class="audio-btn" id="speak-btn"><span class="icon">🔊</span> Wort anhören</button>' +
    '<input type="text" id="eingabe-input" class="' + statusCls.trim() + '" placeholder="Wort eingeben…" autocomplete="off" spellcheck="false"' + val + disabled + '>' +
    '<div class="tipp-box">💡 Bedeutung: <em>' + escapeHtml(a.hinweis) + '</em> &nbsp;·&nbsp; <code>' + lenHint + '</code></div>' +
    '<button class="btn btn-accent" id="pruefen-btn"' + disabled + '>Prüfen</button>' +
  '</div>';
}

function renderFeedback() {
  var la = state.letzteAntwort;
  var cls = la.richtig ? "correct" : "wrong";
  var content = la.richtig
    ? '<strong>✓ Richtig!</strong> Super gemacht.<div class="hint">' + escapeHtml(la.aufgabe.regel) + '</div>'
    : '<strong>✗ Leider falsch.</strong> Du hast geschrieben: <em>' + escapeHtml(la.eingabe) + '</em><br/>Richtig wäre: <strong>' + escapeHtml(la.aufgabe.wort) + '</strong><div class="hint">' + escapeHtml(la.aufgabe.regel) + '</div>';

  // Auch das Aufgaben-Card oben drüber bleibt im Rendering — wir zeigen Aufgabe + Feedback zusammen
  var aufgabeCard = "";
  if (state.aktModus === "multiple") aufgabeCard = renderMultiple();
  else if (state.aktModus === "luecke") aufgabeCard = renderLuecke();
  else if (state.aktModus === "diktat") aufgabeCard = renderDiktat();

  return aufgabeCard +
    '<div class="card">' +
      '<div class="feedback ' + cls + '">' + content + '</div>' +
      '<button class="btn btn-accent" style="margin-top:20px" id="weiter-btn">Weiter →</button>' +
    '</div>';
}

function renderEnde() {
  var max = ANZAHL_RUNDEN * 15;
  var prozent = Math.round((state.score / max) * 100);
  var note = prozent >= 80 ? "Spitzenklasse! 🏆" :
             prozent >= 60 ? "Sehr gut! 🌟" :
             prozent >= 40 ? "Gut gemacht! 👍" :
             prozent >= 20 ? "Weiter üben! 💪" : "Nochmal probieren! 📚";
  var kannLevelUp = state.level < 3 && prozent >= 70;

  var levelUpHtml = kannLevelUp
    ? '<div class="level-up-box"><strong>🎯 Bereit für Level ' + (state.level + 1) + '?</strong></div>'
    : '';

  var fehlerHtml = "";
  if (state.fehler.length > 0) {
    var items = "";
    for (var i = 0; i < state.fehler.length; i++) {
      var f = state.fehler[i];
      items += '<div class="word"><span class="wrong-mark">' + escapeHtml(f.eingabe) + '</span><span class="right-mark">' + escapeHtml(f.aufgabe.wort) + '</span></div>';
    }
    fehlerHtml = '<div class="mistakes-list"><h3>Diese Wörter waren knifflig:</h3>' + items + '</div>';
  }

  var btns = '<button class="btn btn-accent" id="restart-btn">Neue Runde</button>';
  if (kannLevelUp) btns += '<button class="btn btn-blue" id="levelup-btn">Level ' + (state.level + 1) + ' →</button>';
  if (state.fehler.length > 0) btns += '<button class="btn btn-secondary" id="fehler-btn">Fehler üben</button>';

  return '<div class="card end-screen">' +
    '<h2>Geschafft!</h2>' +
    '<div class="big-score">' + state.score + '</div>' +
    '<div style="font-size:14px;font-family:\'JetBrains Mono\',monospace;text-transform:uppercase;letter-spacing:0.15em;color:var(--muted)">Punkte · Level ' + state.level + '</div>' +
    '<p style="margin-top:16px;font-size:22px;font-weight:600">' + note + '</p>' +
    levelUpHtml +
    fehlerHtml +
    '<div class="btn-row">' + btns + '</div>' +
    '<div>' +
      '<button class="nav-link" id="show-stats-btn">📊 Statistik</button>' +
      '<button class="nav-link" id="home-btn" style="margin-left:16px">🏠 Start</button>' +
    '</div>' +
  '</div>';
}

// ============ MAIN RENDER ============
function render() {
  renderStatsBar();
  var app = document.getElementById("app");
  var html = "";

  if (state.phase === "start") html = renderStart();
  else if (state.phase === "statsView") html = renderStatsScreen();
  else if (state.phase === "spielen") {
    if (state.aktModus === "multiple") html = renderMultiple();
    else if (state.aktModus === "luecke") html = renderLuecke();
    else if (state.aktModus === "diktat") html = renderDiktat();
  }
  else if (state.phase === "feedback") html = renderFeedback();
  else if (state.phase === "ende") html = renderEnde();

  app.innerHTML = html;
  attachHandlers();

  // Auto-fokus & Audio
  if (state.phase === "spielen") {
    if (state.aktModus === "luecke" || state.aktModus === "diktat") {
      var inp = document.getElementById("eingabe-input");
      if (inp) setTimeout(function() { inp.focus(); }, 100);
    }
    if (state.aktModus === "diktat") {
      setTimeout(function() { speak(state.aktAufgabe.wort); }, 300);
    }
  }
}

function attachHandlers() {
  // Start screen
  var startBtn = document.getElementById("start-btn");
  if (startBtn) startBtn.addEventListener("click", function() { start(); });

  var levelCards = document.querySelectorAll(".level-card");
  for (var i = 0; i < levelCards.length; i++) {
    (function(card) {
      card.addEventListener("click", function() {
        selectLevel(parseInt(card.getAttribute("data-level"), 10));
      });
    })(levelCards[i]);
  }

  var showStatsBtn = document.getElementById("show-stats-btn");
  if (showStatsBtn) showStatsBtn.addEventListener("click", showStats);

  var backBtn = document.getElementById("back-btn");
  if (backBtn) backBtn.addEventListener("click", backToStart);

  // Multiple choice
  var optionBtns = document.querySelectorAll(".option");
  for (var j = 0; j < optionBtns.length; j++) {
    (function(btn) {
      btn.addEventListener("click", function() {
        handleMultipleClick(btn.getAttribute("data-opt"));
      });
    })(optionBtns[j]);
  }

  // Lückentext / Diktat
  var pruefenBtn = document.getElementById("pruefen-btn");
  if (pruefenBtn) pruefenBtn.addEventListener("click", handlePruefen);

  var inp = document.getElementById("eingabe-input");
  if (inp) inp.addEventListener("keydown", handleEingabeKey);

  var speakBtn = document.getElementById("speak-btn");
  if (speakBtn) speakBtn.addEventListener("click", function() { speak(state.aktAufgabe.wort); });

  // Feedback
  var weiterBtn = document.getElementById("weiter-btn");
  if (weiterBtn) weiterBtn.addEventListener("click", weiter);

  // End screen
  var restartBtn = document.getElementById("restart-btn");
  if (restartBtn) restartBtn.addEventListener("click", function() { start(state.level); });

  var levelupBtn = document.getElementById("levelup-btn");
  if (levelupBtn) levelupBtn.addEventListener("click", function() { start(state.level + 1); });

  var fehlerBtn = document.getElementById("fehler-btn");
  if (fehlerBtn) fehlerBtn.addEventListener("click", fehlerUeben);

  var homeBtn = document.getElementById("home-btn");
  if (homeBtn) homeBtn.addEventListener("click", backToStart);
}

// Stimmen vorladen für Diktat
if ('speechSynthesis' in window) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); };
}

// GO
render();
</script>
</body>
</html>
